edition = "2021"
max_width = 100
use_small_heuristics = "Default"
reorder_imports = true
reorder_modules = true
newline_style = "Unix"

# The following options require nightly rustfmt. CI pins stable, so they are commented out;
# re-enable them locally via `cargo +nightly fmt` if you want the strictest layout.
# imports_granularity = "Crate"
# group_imports = "StdExternalCrate"
# format_code_in_doc_comments = true
# normalize_comments = true
# wrap_comments = true
# comment_width = 100
