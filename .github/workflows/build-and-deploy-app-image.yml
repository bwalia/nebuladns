name: Build odincm docker image and Deploy to Kubernetes

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ dummy/* ]
  schedule:
    - cron: "0 0 * * *"

  workflow_dispatch:
    inputs:
      ENV_REF:
        type: choice
        description: 'Please choose the Target Environment'
        default: 'test'
        required: true
        options:
        - test
        - acc
        - prod

      TARGET_CLUSTER:      
        type: choice
        description: 'Please choose the Target K3S Cluster(s)'
        default: 'k3s2'
        required: true
        options:
        - k3s1
        - k3s2
        - All

      cmd_action:
        type: choice
        description: 'Please choose the GH Action'
        default: 'update'
        required: true
        options:
        - install
        - uninstall
        - Choose

      AWS_REGION_NAME:
        type: choice
        description: 'Please choose the AWS Region name, only pplication while create'
        default: 'london'
        required: true
        options:
        - london
        - dublin
        - Choose

env:
  TARGET_ENV: ${{ github.event.inputs.ENV_REF || 'test' }}
  IMAGE_REGISTRY: "123154119074.dkr.ecr.eu-west-2.amazonaws.com"
  IMAGE_NAME: "odincm"
  IMAGE_TAG: "latest"
  TARGET_CLUSTER: ${{ github.event.inputs.TARGET_CLUSTER }}
  AWS_ACCOUNT_NO: ${{ secrets.AWS_ACCOUNT_NO }}
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
  AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION }}
  AWS_REGION_NAME: ${{ github.event.inputs.AWS_REGION_NAME }}
  cmd_action: ${{ github.event.inputs.cmd_action }}
  REPLICA_COUNT: "1"
  POP_UPDATE_TYPE: ${{ github.event.inputs.pop_update_type }}

jobs:
  # This workflow contains a single job called "build"
  build:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - TEST_NAME: "AWS CLI v2.11.6"
            AWS_CLI_VERSION: "2.11.6"

    name: Checkout Github ${{ matrix.TEST_NAME }} ${{ matrix.AWS_CLI_VERSION }}
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          ref: main

      - name: Build Docker Image and Push to ECR ${{ matrix.TEST_NAME }}
        id: install-aws-cli
        uses: unfor19/install-aws-cli-action@master
        with:
          version: ${{ matrix.AWS_CLI_VERSION }}
      - run: |
          aws --version
          echo "Run bash script to build the docker image and push to aws ecr"
          echo "TARGET_ENV=${{ env.TARGET_ENV }}" >> $GITHUB_ENV
          echo "IMAGE_NAME=${{ env.IMAGE_NAME }}" >> $GITHUB_ENV
          echo "IMAGE_TAG=${{ env.IMAGE_TAG }}" >> $GITHUB_ENV
          if [ -z "${{ env.TARGET_CLUSTER }}" ]; then
            echo "TARGET_CLUSTER=k3s2" >> $GITHUB_ENV
          else
            echo "TARGET_CLUSTER=${{ env.TARGET_CLUSTER }}" >> $GITHUB_ENV
          fi
          echo "AWS_ACCOUNT_NO=${{ env.AWS_ACCOUNT_NO }}" >> $GITHUB_ENV
          echo "AWS_ACCESS_KEY_ID=${{ env.AWS_ACCESS_KEY_ID }}" >> $GITHUB_ENV
          echo "AWS_SECRET_ACCESS_KEY=${{ env.AWS_SECRET_ACCESS_KEY }}" >> $GITHUB_ENV
          echo "AWS_DEFAULT_REGION=${{ env.AWS_DEFAULT_REGION }}" >> $GITHUB_ENV
          echo "AWS_REGION_NAME=${{ env.AWS_REGION_NAME }}" >> $GITHUB_ENV
          echo "cmd_action=${{ env.cmd_action }}" >> $GITHUB_ENV
          echo "REPLICA_COUNT=${{ env.REPLICA_COUNT }}" >> $GITHUB_ENV
          echo "POP_UPDATE_TYPE=${{ env.POP_UPDATE_TYPE }}" >> $GITHUB_ENV
          chmod +x build_and_push_app_image.sh
          ./build_and_push_app_image.sh
        shell: bash

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_DEFAULT_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1

      - name: Helm Deploy - Release (Test or Acc)
        uses: koslib/helm-eks-action@master
        if: ${{ env.TARGET_ENV == 'test' }} || ${{ env.TARGET_ENV == 'acc' }}
        env:
          KUBE_CONFIG_DATA: ${{ secrets.KUBE_CONFIG_DATA_K3S2 }}
        with:
          command: |
            SECRET_NAME=${{ env.AWS_DEFAULT_REGION }}-ecr-registry
            kubectl delete secret --ignore-not-found $SECRET_NAME -n ${{ env.TARGET_ENV }} 
            TOKEN=$(aws ecr get-login-password --region ${{ env.AWS_DEFAULT_REGION }})
            kubectl create secret docker-registry $SECRET_NAME -n ${{ env.TARGET_ENV }} \
            --docker-server=https://${{ env.AWS_ACCOUNT_NO }}.dkr.ecr.${{ env.AWS_DEFAULT_REGION }}.amazonaws.com \
            --docker-username=AWS \
            --docker-password="${TOKEN}" \
            --docker-email="${EMAIL}"
            helm upgrade -i odincm-${{ env.TARGET_ENV }} ./devops/odincm-chart -f devops/odincm-chart/values-${{ env.TARGET_ENV }}-${{ env.TARGET_CLUSTER }}.yaml --set-string targetImage="${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAME }}" --set-string targetImageTag="${{ env.IMAGE_TAG }}" --set-string capthaSiteKey="${{ secrets.CAPTCHA_SITE_KEY }}" --namespace ${{ env.TARGET_ENV }} --create-namespace
            kubectl rollout restart deployment/odincm-${{ env.TARGET_ENV }} -n ${{ env.TARGET_ENV }}
            kubectl rollout history deployment/odincm-${{ env.TARGET_ENV }} -n ${{ env.TARGET_ENV }}

      - name: Helm Deploy - Release (Prod)
        uses: koslib/helm-eks-action@master
        if: ${{ env.TARGET_ENV == 'prod' }}
        env:
          KUBE_CONFIG_DATA: ${{ secrets.KUBE_CONFIG_DATA_K3S1 }}
        with:
          command: |
            SECRET_NAME=${{ env.AWS_DEFAULT_REGION }}-ecr-registry
            kubectl delete secret --ignore-not-found $SECRET_NAME -n ${{ env.TARGET_ENV }} 
            TOKEN=$(aws ecr get-login-password --region ${{ env.AWS_DEFAULT_REGION }})
            kubectl create secret docker-registry $SECRET_NAME -n ${{ env.TARGET_ENV }} \
            --docker-server=https://${{ env.AWS_ACCOUNT_NO }}.dkr.ecr.${{ env.AWS_DEFAULT_REGION }}.amazonaws.com \
            --docker-username=AWS \
            --docker-password="${TOKEN}" \
            --docker-email="${EMAIL}"
            helm upgrade -i odincm-${{ env.TARGET_ENV }} ./devops/odincm-chart -f devops/odincm-chart/values-${{ env.TARGET_ENV }}-${{ env.TARGET_CLUSTER }}.yaml --set-string targetImage="${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAME }}" --set-string targetImageTag="${{ env.IMAGE_TAG }}" --set-string capthaSiteKey="${{ secrets.CAPTCHA_SITE_KEY }}" --namespace ${{ env.TARGET_ENV }} --create-namespace
            kubectl rollout restart deployment/odincm-${{ env.TARGET_ENV }} -n ${{ env.TARGET_ENV }}
            kubectl rollout history deployment/odincm-${{ env.TARGET_ENV }} -n ${{ env.TARGET_ENV }}

      - name: Slack Notification for OdinCM release 
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_CHANNEL: general
          SLACK_COLOR: ${{ job.status }}
          SLACK_ICON: https://github.com/rtCamp.png?size=48
          SLACK_MESSAGE: 'OdinCM Deployment successful to ${{ env.TARGET_ENV }} env :rocket::'
          SLACK_TITLE: OdinCM Deployment Status
          SLACK_USERNAME: rtCamp
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}