name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  RUSTFLAGS: -Dwarnings

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with: { components: rustfmt }
      - run: cargo fmt --all --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with: { components: clippy }
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: test (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with: { tool: cargo-nextest }
      - run: cargo nextest run --workspace --profile ci
      - run: cargo test --workspace --doc

  build-musl:
    name: build musl (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-unknown-linux-musl
          - aarch64-unknown-linux-musl
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: cross
      - run: cross build --release --target ${{ matrix.target }} --bin nebuladns --bin nebulactl

  deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check

  audit:
    name: cargo-audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  fuzz-smoke:
    name: fuzz smoke (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: [header_decode, question_decode, name_decode, message_decode]
    # Unset the workspace-wide `-Dwarnings`: cargo-fuzz appends its own sanitizer
    # flags, and treating every nursery-level warning as an error from a *release*
    # sanitizer build is needlessly strict. Keep clippy as the warning gate.
    env:
      RUSTFLAGS: ""
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with: { tool: cargo-fuzz }
      - name: Smoke run (60s)
        # Force x86_64-unknown-linux-gnu so cargo-fuzz doesn't try to build against musl
        # (which would require `x86_64-linux-musl-g++` which isn't on ubuntu-latest).
        run: |
          cargo +nightly fuzz run ${{ matrix.target }} \
            --fuzz-dir crates/nebula-wire/fuzz \
            --target x86_64-unknown-linux-gnu \
            -- -max_total_time=60 -print_final_stats=1

  helm:
    name: helm lint + kubeconform
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
      - name: helm lint
        run: helm lint deploy/helm/nebuladns --strict
      - name: helm template (example with a zone)
        # Include a real zone so the zones ConfigMap + helm-test pod paths render.
        run: |
          helm template test deploy/helm/nebuladns \
            --set "zones[0].name=example.com" \
            --set "zones[0].content=origin = \"example.com.\"" \
            > /tmp/rendered.yaml
      - name: Install kubeconform
        run: |
          KC_VERSION=v0.6.7
          curl -fsSL "https://github.com/yannh/kubeconform/releases/download/${KC_VERSION}/kubeconform-linux-amd64.tar.gz" \
            | tar -xz -C /usr/local/bin kubeconform
          kubeconform -v
      - name: kubeconform (strict, permits CRDs from Prometheus Operator)
        run: |
          kubeconform -strict -summary -schema-location default \
            -schema-location 'https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/{{.Group}}/{{.ResourceKind}}_{{.ResourceAPIVersion}}.json' \
            /tmp/rendered.yaml

  dockerfile:
    name: hadolint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: deploy/docker/Dockerfile
          # DL3008 (pin apt versions) is noisy and not what we care about for a
          # throwaway builder stage. Security scanning is cargo-audit's job.
          ignore: DL3008

  shellcheck:
    name: shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ludeeus/action-shellcheck@master
        with:
          severity: warning

  ansible:
    name: ansible-lint + syntax-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with: { python-version: "3.12" }
      - name: Install ansible
        run: |
          pip install "ansible-core==2.17.*" "ansible-lint==24.*" "yamllint==1.*"
          ansible-galaxy collection install -r deploy/ansible/requirements.yml
      - name: yamllint
        # Use the config that lives next to the Ansible tree so line-length etc. match
        # the local `yamllint` pass. `-s` = strict (warnings fail).
        run: yamllint -s -c deploy/ansible/.yamllint deploy/ansible/
      - name: ansible-lint
        working-directory: deploy/ansible
        run: ansible-lint -p --offline playbook.yml rollback.yml
      - name: Syntax-check (playbook.yml)
        working-directory: deploy/ansible
        run: ansible-playbook -i inventory.example.ini playbook.yml --syntax-check
      - name: Syntax-check (rollback.yml)
        working-directory: deploy/ansible
        run: ansible-playbook -i inventory.example.ini rollback.yml --syntax-check
