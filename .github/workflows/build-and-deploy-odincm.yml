name: CD - Helm 1-Click Deploy OdinCM to an ENV - to Kubernetes

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ dummy/* ]
  workflow_dispatch:
    inputs:
      ENV_REF:
        type: choice
        description: 'Please choose the Target Environment'
        default: 'test'
        required: true
        options:
        - test
        - acc
        - prod

      TARGET_CLUSTER:      
        type: choice
        description: 'Please choose the Target K3S Cluster(s)'
        default: 'k3s2'
        required: true
        options:
        - k3s1
        - k3s2
        - k3s3
        - All

      cmd_action:
        type: choice
        description: 'Please choose the GH Action'
        default: 'update'
        required: true
        options:
        - install
        - uninstall
        - Choose

      AWS_REGION_NAME:
        type: choice
        description: 'Please choose the AWS Region name, only pplication while create'
        default: 'london'
        required: true
        options:
        - london
        - dublin
        - Choose

      k3s_cluster_name:
        type: choice
        description: 'Please choose the k3s cluster name'
        default: 'k3s2'
        required: true
        options:
        - k3s1
        - k3s2
        - Choose

env:
  TARGET_ENV: ${{ github.event.inputs.ENV_REF }}
  IMAGE_NAME: "odincm"
  IMAGE_TAG: "latest"
  TARGET_CLUSTER: ${{ github.event.inputs.TARGET_CLUSTER }}
  AWS_ACCOUNT_NO: ${{ secrets.AWS_ACCOUNT_NO }}
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
  AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION }}
  AWS_REGION_NAME: ${{ github.event.inputs.AWS_REGION_NAME }}
  cmd_action: ${{ github.event.inputs.cmd_action }}
  REPLICA_COUNT: "1"
  POP_UPDATE_TYPE: ${{ github.event.inputs.pop_update_type }}

jobs:
  # This workflow contains a single job called "build"
  build:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - TEST_NAME: "Specific v2"
            AWS_CLI_VERSION: "2.11.6"
          - TEST_NAME: "No Input"

    name: Test ${{ matrix.TEST_NAME }} ${{ matrix.AWS_CLI_VERSION }}
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          ref: main

      - name: Test ${{ matrix.TEST_NAME }}
        id: install-aws-cli
        uses: unfor19/install-aws-cli-action@master
        with:
          version: ${{ matrix.AWS_CLI_VERSION }}
      - run: |
          aws --version
          echo "Run bash script to build the docker image and push to aws ecr"
          chmod +x build_and_push_odincm.sh
          ./build_and_push_odincm.sh
        shell: bash

      - name: Helm Deploy - Release
        uses: koslib/helm-eks-action@master
        with:
          command: |
            command: helm upgrade -i odincm-${{ env.TARGET_ENV }} ./devops/odincm-chart -f devops/odincm-chart/values-${{ env.TARGET_ENV }}-${{ env.TARGET_CLUSTER}}.yaml --set-string targetImage="${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAME }}" --set-string targetImageTag="${{ env.IMAGE_TAG }}" --set-string capthaSiteKey="${{ secrets.CAPTCHA_SITE_KEY }}" --namespace ${{ env.TARGET_ENV }} --create-namespace
            kubectl rollout restart deployment/odincm-${{ env.TARGET_ENV }} -n ${{ env.TARGET_ENV }}
            kubectl rollout history deployment/odincm-${{ env.TARGET_ENV }} -n ${{ env.TARGET_ENV }}

      - name: Slack Notification for OdinCM release 
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_CHANNEL: general
          SLACK_COLOR: ${{ job.status }}
          SLACK_ICON: https://github.com/rtCamp.png?size=48
          SLACK_MESSAGE: 'Post Content :rocket:'
          SLACK_TITLE: Post Title
          SLACK_USERNAME: rtCamp
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}