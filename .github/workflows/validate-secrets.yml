name: validate-secrets

# Read-only checks that the three DEPLOY_* secrets are *well-formed*. Does NOT attempt
# any outbound SSH — pure parser/decoder sanity. Delete this workflow after you're
# satisfied the secrets are good.

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check required secrets are set
        env:
          K1: ${{ secrets.DEPLOY_SSH_KEY }}
          K2: ${{ secrets.DEPLOY_KNOWN_HOSTS }}
          K3: ${{ secrets.DEPLOY_INVENTORY }}
        run: |
          set -e
          [ -n "$K1" ] || { echo "::error::DEPLOY_SSH_KEY is empty"; exit 1; }
          [ -n "$K2" ] || { echo "::error::DEPLOY_KNOWN_HOSTS is empty"; exit 1; }
          [ -n "$K3" ] || { echo "::error::DEPLOY_INVENTORY is empty"; exit 1; }
          echo "::notice::All three DEPLOY_* secrets are present."

      - name: Validate DEPLOY_SSH_KEY format
        env:
          KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          set -e
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          printf '%s\n' "$KEY" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          # ssh-keygen -y reads a private key and prints the corresponding public key.
          # It exits non-zero with a clear message on any decode failure.
          # We throw away the public key to avoid leaking it into the logs.
          if ssh-keygen -y -f ~/.ssh/id_deploy >/dev/null 2>&1; then
            kind="$(ssh-keygen -y -f ~/.ssh/id_deploy | awk '{print $1}')"
            fp="$(ssh-keygen -lf ~/.ssh/id_deploy | awk '{print $2}')"
            echo "::notice::DEPLOY_SSH_KEY decodes as $kind (fingerprint: $fp)"
          else
            echo "::error::DEPLOY_SSH_KEY failed to decode — ssh-keygen rejected it"
            exit 1
          fi
          # Scrub.
          shred -uzf ~/.ssh/id_deploy 2>/dev/null || rm -f ~/.ssh/id_deploy

      - name: Validate DEPLOY_KNOWN_HOSTS format
        env:
          KH: ${{ secrets.DEPLOY_KNOWN_HOSTS }}
        run: |
          set -e
          printf '%s\n' "$KH" > /tmp/known_hosts
          lines="$(wc -l </tmp/known_hosts)"
          # ssh-keygen -l prints one line per valid host key.
          valid="$(ssh-keygen -lf /tmp/known_hosts 2>/dev/null | wc -l)"
          if [ "$valid" -gt 0 ]; then
            echo "::notice::DEPLOY_KNOWN_HOSTS parses: $valid host key(s) across $lines line(s)"
          else
            echo "::error::DEPLOY_KNOWN_HOSTS did not yield any valid host keys"
            head -1 /tmp/known_hosts | cut -c1-40
            exit 1
          fi
          rm -f /tmp/known_hosts

      - name: Validate DEPLOY_INVENTORY as Ansible inventory
        env:
          INV: ${{ secrets.DEPLOY_INVENTORY }}
        run: |
          set -e
          pip install "ansible-core==2.17.*" >/dev/null
          printf '%s\n' "$INV" > /tmp/inventory.ini
          # Redact common credential-ish vars before printing the preview.
          redacted="$(sed -E 's/(ansible_password|ansible_ssh_pass|token|secret)=[^ ]*/\1=REDACTED/g' /tmp/inventory.ini)"
          echo "::group::Inventory preview (credentials redacted)"
          echo "$redacted" | head -30
          echo "::endgroup::"
          # --list parses the inventory; a parse failure exits non-zero.
          hosts="$(ansible-inventory -i /tmp/inventory.ini --list 2>/dev/null \
                   | python3 -c 'import json,sys; d=json.load(sys.stdin); print(len(d.get("_meta",{}).get("hostvars",{})))')"
          [ "$hosts" -gt 0 ] || { echo "::error::inventory parses but contains zero hosts"; exit 1; }
          groups="$(ansible-inventory -i /tmp/inventory.ini --list 2>/dev/null \
                    | python3 -c 'import json,sys; d=json.load(sys.stdin); print(",".join(k for k in d if k not in ("_meta","all","ungrouped")))')"
          echo "::notice::DEPLOY_INVENTORY: $hosts host(s), groups: $groups"
          # Ensure the `nebuladns` group the playbook targets actually exists.
          if echo "$groups" | tr ',' '\n' | grep -qx nebuladns; then
            echo "::notice::inventory has a [nebuladns] group — good"
          else
            echo "::error::inventory is missing the [nebuladns] group that playbook.yml targets"
            exit 1
          fi
          rm -f /tmp/inventory.ini

      - name: Summary
        run: |
          echo "### DEPLOY_* secrets validated ✅" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "All three secrets decode, parse, and reference the correct Ansible group." >> "$GITHUB_STEP_SUMMARY"
          echo "This workflow does NOT attempt SSH — real connectivity is only tested when the full deploy.yml runs." >> "$GITHUB_STEP_SUMMARY"
