name: test-docker

on:
  push:
    branches: [main]
    paths:
      - "crates/**"
      - "deploy/docker/**"
      - "config/**"
      - "zones/**"
      - "Cargo.*"
      - ".github/workflows/test-docker.yml"
  pull_request:
    branches: [main]
    paths:
      - "crates/**"
      - "deploy/docker/**"
      - "config/**"
      - "zones/**"
      - "Cargo.*"
      - ".github/workflows/test-docker.yml"
  workflow_dispatch:

concurrency:
  group: test-docker-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  compose:
    name: docker compose smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build nebuladns:dev image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/docker/Dockerfile
          tags: nebuladns:dev
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install dig client (for external probe)
        run: sudo apt-get update && sudo apt-get install -y dnsutils curl

      - name: Start rig (nebuladns + prometheus + grafana)
        working-directory: deploy/docker/compose
        run: |
          docker compose up -d nebuladns prometheus
          # Wait for the health check to report healthy. `docker compose` doesn't block
          # on health by default; poll the health state instead.
          for i in $(seq 1 30); do
            state="$(docker inspect -f '{{.State.Health.Status}}' nebuladns 2>/dev/null || echo none)"
            echo "attempt $i: nebuladns health=$state"
            [ "$state" = "healthy" ] && break
            sleep 2
          done
          docker inspect -f '{{.State.Health.Status}}' nebuladns | grep -q healthy

      - name: Smoke via compose `smoke` profile
        working-directory: deploy/docker/compose
        run: docker compose --profile smoke run --rm smoke

      - name: External dig (UDP) from the runner
        run: |
          dig @127.0.0.1 -p 5353 www.example.com A +short | tee /tmp/a.out
          grep -q '192.0.2.10' /tmp/a.out
          grep -q '192.0.2.11' /tmp/a.out

      - name: External dig (TCP) from the runner
        run: |
          dig @127.0.0.1 -p 5353 +tcp example.com SOA +short | tee /tmp/soa.out
          grep -q 'ns1.example.com' /tmp/soa.out

      - name: /metrics scrape
        run: |
          curl -fsS http://127.0.0.1:9090/metrics | tee /tmp/metrics.out >/dev/null
          grep -q '^nebula_dns_queries_total' /tmp/metrics.out
          grep -q '^nebula_build_info' /tmp/metrics.out

      - name: Prometheus scrape check
        run: |
          # Give Prometheus one scrape cycle.
          sleep 16
          # Let curl URL-encode the PromQL for us; embedding %22 in shell-quoted strings
          # is one of those things that sometimes breaks and we lose an hour debugging it.
          curl -fsSG 'http://127.0.0.1:9091/api/v1/query' \
            --data-urlencode 'query=up{job="nebuladns"}' \
            | tee /tmp/prom.json | grep -q '"value":\[.*,"1"\]'

      - name: Dump logs on failure
        if: failure()
        working-directory: deploy/docker/compose
        run: |
          docker compose ps
          docker compose logs --no-color --tail=200 nebuladns prometheus grafana || true

      - name: Tear down
        if: always()
        working-directory: deploy/docker/compose
        run: docker compose down -v
