name: 'Docker Image matrix - Creates a new Docker images and tags them'
run-name: 'Docker Image matrix - Creates a new Docker images and tags them'

# **What it does**: Renders the content of every page and check all internal links.
# **Why we have it**: To make sure all links connect correctly.
# **Who does it impact**: Docs content.

on:
  workflow_dispatch:
  push:
    branches:
      - main
      
env:
  IMAGE_TAG: "test"

jobs:
  deployment:
    runs-on: 'ubuntu-latest'
    steps:

    - name: Checkout OdinCM Repository
      uses: actions/checkout@v3
      with:
        ref: main

    - name: Test run bash
      run: ls -al && tree

    - name: Test if docker is available
      run: docker -v

    - name: Build the docker image
      run: docker build -f devops/docker/Dockerfile-nuxt-server -t odincm . --no-cache

    - name: Tag the image for AWS ecr
      run: docker tag odincm 123154119074.dkr.ecr.eu-west-2.amazonaws.com/odincm:latest

    - name: Authenticate to AWS ecr and Push the image to AWS ecr
      run: |
        AWS_PASSWORD=$(aws ecr get-login-password --region eu-west-2)
        docker login --username AWS --password ${AWS_PASSWORD}  123154119074.dkr.ecr.eu-west-2.amazonaws.com
        docker push 123154119074.dkr.ecr.eu-west-2.amazonaws.com/odincm:latest
      shell: bash
