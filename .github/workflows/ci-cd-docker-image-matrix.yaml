name: Docker Image matrix - Creates a new Docker images and tags them
run-name: Creates a new Docker image, pushes it, and tags it - ${{ github.event.inputs.IMAGE_NAME }} tag ${{ github.event.inputs.IMAGE_TAG }} from ${{ github.event.inputs.BRANCH_REF }} branch

on:
  push:
    branches: [ main ]
  schedule:
    - cron: "0 0 * * 0"

  workflow_dispatch:
    inputs:
      BRANCH_REF:
        type: choice
        description: 'Please choose the Target Branch'
        default: 'main'
        required: true
        options:
        - main
        - test
        - dev

      IMAGE_REGISTRY:
        type: choice
        description: 'Please choose docker image registry to push'
        default: '123154119074.dkr.ecr.eu-west-2.amazonaws.com'
        required: true
        options:
        - docker.io
        - ghcr.io
        - registry.workstation.co.uk
        - 123154119074.dkr.ecr.eu-west-2.amazonaws.com

      IMAGE_NAME:
        type: choice
        description: 'Please choose docker image name to push'
        default: 'odincm'
        required: true
        options:
        - odincm

      IMAGE_TAG:
        type: choice
        description: 'Please choose docker image tag to push'
        default: 'latest'
        required: true
        options:
        - latest
        - stable
        - prod
        - acc
        - test
        - dev

env:
  AWS_ACCOUNT_ID: "${{ secrets.AWS_ACCOUNT_ID }}"
  IMAGE_REGISTRY: ${{ github.event.inputs.IMAGE_REGISTRY }}
  IMAGE_NAME: ${{ github.event.inputs.IMAGE_NAME }}
  IMAGE_TAG: ${{ github.event.inputs.IMAGE_TAG }}
  BRANCH_REF: ${{ github.event.inputs.BRANCH_REF }}
  TARGET_CLUSTER: "k3s2"
  TARGET_ENV: "test"

jobs:
  deployment:
    runs-on: 'ubuntu-latest'
    steps:

    - name: Checkout OdinCM Repository
      uses: actions/checkout@v3
      with:
        ref: main

    - name: Generate a short-sha based on the git commit
      uses: benjlevesque/short-sha@v1.2
      with:
        length: 6

    - run: echo $SHA
      env:
       SHA: ${{ steps.short-sha.outputs.sha }}

    - run: echo $SHA
      env:
       SHA: ${{ env.SHA }}

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v1
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ secrets.AWS_REGION }}

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v1

    - name: Build, tag, and push OdinCM Docker image to the AWS ECR mentioned 
      run: |
        IMAGE_REGISTRY=.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com
        IMAGE_NAME=odincm
        IMAGE_TAG=latest
        if [ -z "${{ env.BRANCH_REF }}" ]; then
          echo "BRANCH_REF=main" >> $GITHUB_ENV
        fi
        docker build -f $(pwd)/devops/docker/Dockerfile-nuxt-server -t $IMAGE_NAME . --no-cache
        docker tag $IMAGE_NAME $IMAGE_REGISTRY/$IMAGE_NAME:$IMAGE_TAG
        aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | docker login --username AWS --password-stdin ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.eu-west-2.amazonaws.com
        docker push $IMAGE_REGISTRY/$IMAGE_NAME:$IMAGE_TAG

    - name: Slack Notification for OdinCM - Docker Images Matrix Manager 
      uses: rtCamp/action-slack-notify@v2
      env:
        SLACK_CHANNEL: general
        SLACK_COLOR: ${{ job.status }}
        SLACK_ICON: https://github.com/rtCamp.png?size=48
        SLACK_MESSAGE: 'Post Content :rocket:'
        SLACK_TITLE: Post Title
        SLACK_USERNAME: rtCamp
        SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}

