{{- if .Values.prometheusRule.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: {{ include "nebuladns.fullname" . }}
  labels:
    {{- include "nebuladns.labels" . | nindent 4 }}
    {{- with .Values.prometheusRule.labels }}{{ toYaml . | nindent 4 }}{{- end }}
spec:
  groups:
    - name: nebuladns.alerts
      rules:
        # M0 alerts: only runtime-level signals; data-plane alerts arrive in M2+.
        - alert: NebulaDNSDown
          expr: up{job=~".*nebuladns.*"} == 0
          for: 2m
          labels:
            severity: page
          annotations:
            summary: "NebulaDNS instance {{ "{{" }} $labels.instance {{ "}}" }} is down"
            runbook_url: "https://docs.nebuladns.io/runbooks/NebulaDNSDown"
{{- end }}
