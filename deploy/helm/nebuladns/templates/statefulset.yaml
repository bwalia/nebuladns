apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "nebuladns.fullname" . }}
  labels:
    {{- include "nebuladns.labels" . | nindent 4 }}
spec:
  serviceName: {{ include "nebuladns.fullname" . }}-headless
  replicas: {{ .Values.replicaCount }}
  podManagementPolicy: Parallel
  selector:
    matchLabels:
      {{- include "nebuladns.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "nebuladns.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}{{ toYaml . | nindent 8 }}{{- end }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}{{ toYaml . | nindent 8 }}{{- end }}
    spec:
      serviceAccountName: {{ include "nebuladns.serviceAccountName" . }}
      automountServiceAccountToken: false
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets: {{ toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds }}
      containers:
        - name: nebuladns
          image: {{ include "nebuladns.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          args:
            - "--config"
            - "/etc/nebuladns/nebuladns.toml"
          ports:
            - name: api
              containerPort: 8080
              protocol: TCP
            - name: metrics
              containerPort: 9090
              protocol: TCP
            {{- if .Values.service.dns.enabled }}
            - name: dns-udp
              containerPort: 53
              protocol: UDP
            - name: dns-tcp
              containerPort: 53
              protocol: TCP
            {{- end }}
          livenessProbe:
            httpGet:
              path: /livez
              port: api
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: api
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /livez
              port: api
            periodSeconds: 2
            failureThreshold: 30
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          env:
            - name: NEBULA_API_BIND
              value: "127.0.0.1:8080"
            {{- with .Values.env }}{{ toYaml . | nindent 12 }}{{- end }}
          volumeMounts:
            - name: config
              mountPath: /etc/nebuladns/nebuladns.toml
              subPath: nebuladns.toml
              readOnly: true
            {{- if .Values.zones }}
            - name: zones
              mountPath: /etc/nebuladns/zones
              readOnly: true
            {{- end }}
            - name: tmp
              mountPath: /tmp
            {{- if .Values.persistence.enabled }}
            - name: data
              mountPath: /var/lib/nebuladns
            {{- end }}
            {{- with .Values.extraVolumeMounts }}{{ toYaml . | nindent 12 }}{{- end }}
          lifecycle:
            preStop:
              exec:
                command:
                  - "/bin/sh"
                  - "-c"
                  - "sleep 5"  # let endpoints drain before SIGTERM
      volumes:
        - name: config
          configMap:
            name: {{ include "nebuladns.fullname" . }}-config
        {{- if .Values.zones }}
        - name: zones
          configMap:
            name: {{ include "nebuladns.fullname" . }}-zones
        {{- end }}
        - name: tmp
          emptyDir: {}
        {{- with .Values.extraVolumes }}{{ toYaml . | nindent 8 }}{{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector: {{ toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity: {{ toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations: {{ toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.topologySpreadConstraints }}
      topologySpreadConstraints: {{ toYaml . | nindent 8 }}
      {{- end }}
  {{- if .Values.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: {{ .Values.persistence.accessModes }}
        resources:
          requests:
            storage: {{ .Values.persistence.size }}
        {{- with .Values.persistence.storageClass }}
        storageClassName: {{ . }}
        {{- end }}
  {{- end }}
