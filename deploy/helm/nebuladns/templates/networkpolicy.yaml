{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "nebuladns.fullname" . }}
  labels:
    {{- include "nebuladns.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "nebuladns.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.networkPolicy.allowScrapeFromNamespace }}
      ports:
        - port: metrics
    - from:
        - podSelector: {}
      ports:
        - port: api
        {{- if .Values.service.dns.enabled }}
        - port: dns-udp
          protocol: UDP
        - port: dns-tcp
          protocol: TCP
        {{- end }}
  egress:
    # DNS resolution
    - to:
        - namespaceSelector: {}
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
{{- end }}
