; Example Ansible inventory. Copy the structure into the DEPLOY_INVENTORY secret
; (the deploy workflow writes that secret to deploy/ansible/inventory.ini on the
; runner, then deletes it afterwards).

[nebuladns]
ns1.example.com ansible_host=203.0.113.10 ansible_user=deploy
ns2.example.com ansible_host=203.0.113.11 ansible_user=deploy

[nebuladns:vars]
ansible_python_interpreter=/usr/bin/python3
; Tell the runner to use the SSH key written by the workflow.
ansible_ssh_private_key_file=~/.ssh/id_deploy
ansible_ssh_common_args='-o StrictHostKeyChecking=yes -o UserKnownHostsFile=~/.ssh/known_hosts'
