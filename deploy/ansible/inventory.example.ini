; Real staging inventory for NebulaDNS. Nameserver IPs are public by design
; (they get published in NS records), so committing them here is fine.
;
; The deploy workflow also accepts DEPLOY_INVENTORY as a secret and writes it
; to deploy/ansible/inventory.ini at runtime — this file is the source of truth
; for that secret. Keep the two in sync.

[nebuladns]
ns1.nebuladns 	ansible_host=187.77.179.206  ansible_user=root
ns2.nebuladns 	ansible_host=187.124.112.155 ansible_user=root

[nebuladns:vars]
ansible_python_interpreter=/usr/bin/python3
; Tell the runner to use the SSH key written by the workflow.
ansible_ssh_private_key_file=~/.ssh/id_deploy
ansible_ssh_common_args='-o StrictHostKeyChecking=yes -o UserKnownHostsFile=~/.ssh/known_hosts'
