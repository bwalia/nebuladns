---
apiVersion: v1
kind: Service
metadata:
  name: odincmport-{{ .Values.targetEnv }}
spec:
  selector:
      {{- include "odincm.selectorLabels" . | nindent 6 }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.port }}
      nodePort: {{ .Values.svcAccessPort }}
  type: NodePort
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "odincm.fullname" . }}
  labels:
    {{- include "odincm.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.port }}
  selector:
    {{- include "odincm.selectorLabels" . | nindent 4 }}